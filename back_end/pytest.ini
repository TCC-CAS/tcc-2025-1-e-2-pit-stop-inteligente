[pytest]
DJANGO_SETTINGS_MODULE = core.settings.local
python_files = test_*.py *_test.py tests.py
python_classes = Test*
python_functions = test_*
testpaths = apps
addopts =
    --strict-markers
    --tb=short
    -ra
    --reuse-db
    --color=yes
    --junitxml=reports/junit.xml
markers =
    integration: marca testes que dependem do banco real (mais lentos)
    unit: marca testes unitários puros
