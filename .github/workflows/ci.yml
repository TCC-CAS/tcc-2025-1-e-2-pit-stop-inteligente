name: CI

# Pipeline mínimo de Integração Contínua para o Pit Stop Inteligente.
# - back-end: instala dependências, roda migrações em PostgreSQL temporário e
#   executa a suite pytest-django.
# - front-end: valida estrutura básica e checa por padrões problemáticos (URLs
#   hardcoded, fetch direto, etc.).

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backend-tests:
    name: Back-end · pytest-django
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: back_end

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pitstop_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: local
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-prod
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: pitstop_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      CORS_ALLOW_ALL_ORIGINS: "True"
      CORS_ALLOWED_ORIGINS: http://localhost:5500
      CSRF_TRUSTED_ORIGINS: http://localhost:5500

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: back_end/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run pytest
        run: pytest -v

  frontend-checks:
    name: Front-end · Sanity checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifica que nenhum arquivo .js tem URL absoluta hardcoded para o backend
        run: |
          # API_BASE_URL deve vir de shared/config/api-config.js, nunca duplicado.
          # Falha se encontrar a URL hardcoded fora do arquivo de config.
          if grep -RIl --include='*.js' --exclude-dir=shared/config 'http://127.0.0.1:8000' front_end/src; then
            echo "::error::URL absoluta detectada. Use apiUrl()/API_URL de shared/config/api-config.js."
            exit 1
          fi

      - name: Verifica HTML semantico mínimo (lang + viewport)
        run: |
          # Só verifica páginas completas (com <!DOCTYPE>); ignora fragmentos de tabs
          # carregados dinamicamente em os-visao-geral.html.
          fail=0
          for html in $(find front_end/src -name '*.html' -not -path '*/node_modules/*'); do
            grep -q -i '<!DOCTYPE' "$html" || continue
            grep -q '<html[^>]*lang=' "$html" || { echo "::error file=$html::lang ausente"; fail=1; }
            grep -q 'name="viewport"' "$html" || { echo "::error file=$html::viewport ausente"; fail=1; }
          done
          exit $fail

  python-lint:
    name: Back-end · Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff==0.7.1

      - name: Run ruff (não-bloqueante por enquanto)
        run: ruff check back_end/apps back_end/core || true

  e2e-tests:
    name: E2E · Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pitstop_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: local
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-prod
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: pitstop_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500
      CSRF_TRUSTED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: back_end/requirements.txt

      - name: Install backend dependencies
        working-directory: back_end
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate + seed E2E
        working-directory: back_end
        run: |
          python manage.py migrate --noinput
          python manage.py seed_e2e

      - name: Start Django (background)
        working-directory: back_end
        run: |
          nohup python manage.py runserver 8000 --noreload > /tmp/django.log 2>&1 &
          echo "Aguardando o Django subir em :8000…"
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/ >/dev/null 2>&1; then
              echo "Django no ar."; exit 0
            fi
            sleep 1
          done
          echo "::error::Django não respondeu a tempo."; cat /tmp/django.log; exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_end/tests-e2e/package-lock.json

      - name: Install Playwright + Chromium
        working-directory: front_end/tests-e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: front_end/tests-e2e
        run: npm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front_end/tests-e2e/playwright-report/
          retention-days: 7
