# Pit Stop — nginx: serve o front-end estático e faz proxy da API/admin
# para o gunicorn (serviço "web"). Front e API no MESMO domínio (same-origin),
# o que dispensa CORS e mantém o cookie de sessão funcionando.

upstream pitstop_web {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Uploads (logo da oficina, fotos de OS) — alinhado ao FILE_UPLOAD do Django.
    client_max_body_size 50m;

    # Cabeçalhos repassados ao Django (herdados por todos os location).
    # X-Forwarded-Proto alimenta o SECURE_PROXY_SSL_HEADER quando houver TLS.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Front-end estático servido diretamente.
    root /usr/share/nginx/front;
    index index.html;

    # Raiz -> tela de login. Ajuste o destino se a entrada do seu front mudar.
    location = / {
        return 302 /app/login/pages/login-page.html;
    }

    # API REST.
    location /api/ {
        proxy_pass http://pitstop_web;
    }

    # Painel administrativo do Django.
    location /admin/ {
        proxy_pass http://pitstop_web;
    }

    # Estáticos do Django (admin + DRF), gerados pelo collectstatic/WhiteNoise.
    location /static/ {
        alias /usr/share/nginx/static/;
        access_log off;
        expires 30d;
    }

    # Uploads enviados pelos usuários.
    location /media/ {
        alias /usr/share/nginx/media/;
        access_log off;
        expires 7d;
    }

    # Qualquer outro caminho é servido como arquivo do front.
    location / {
        try_files $uri $uri/ =404;
    }
}
