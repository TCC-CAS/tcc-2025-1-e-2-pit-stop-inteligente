<link rel="stylesheet" href="../../detalhes/style/detalhes-tab.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="tab-card fade-in">
    <div class="tab-card-header">
        <h3 class="tab-card-title">
            <i class="fas fa-clipboard-list"></i> Dados do Veículo e Cliente
        </h3>
    </div>

    <!-- Cards modernos e organizados -->
    <div class="info-cards-grid">
        <div class="modern-card">
            <div class="card-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="card-content">
                <span class="card-label">Cliente</span>
                <span class="card-value" id="detalhe-cliente-nome">--</span>
            </div>
        </div>

        <div class="modern-card">
            <div class="card-icon">
                <i class="fas fa-id-card"></i>
            </div>
            <div class="card-content">
                <span class="card-label">CPF/CNPJ</span>
                <span class="card-value" id="detalhe-cliente-doc">--</span>
            </div>
        </div>

        <div class="modern-card">
            <div class="card-icon">
                <i class="fas fa-car"></i>
            </div>
            <div class="card-content">
                <span class="card-label">Veículo</span>
                <span class="card-value" id="detalhe-veiculo-modelo">--</span>
            </div>
        </div>

        <div class="modern-card">
            <div class="card-icon">
                <i class="fas fa-tag"></i>
            </div>
            <div class="card-content">
                <span class="card-label">Placa</span>
                <span class="card-value" id="detalhe-veiculo-placa">--</span>
            </div>
        </div>

        <div class="modern-card">
            <div class="card-icon">
                <i class="fas fa-tachometer-alt"></i>
            </div>
            <div class="card-content">
                <span class="card-label">KM Atual</span>
                <span class="card-value" id="detalhe-veiculo-km">--</span>
            </div>
        </div>

        <div class="modern-card">
            <div class="card-icon">
                <i class="fas fa-palette"></i>
            </div>
            <div class="card-content">
                <span class="card-label">Ano / Cor</span>
                <span class="card-value" id="detalhe-veiculo-ano-cor">--</span>
            </div>
        </div>
    </div>
</div>

<div class="tab-card">
    <div class="tab-card-header">
        <h3 class="tab-card-title">Checklist de Recebimento</h3>
    </div>
    <div class="table-container">
        <table id="tabelaChecklistRecebimento">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Status</th>
                    <th>Observações</th>
                </tr>
            </thead>
            <tbody id="checklist-body">
                <!-- preenchido via JS -->
            </tbody>
        </table>
    </div>
</div>
