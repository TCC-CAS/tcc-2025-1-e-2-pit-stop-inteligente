<!-- front_end/src/modulos/modulo_oficina/ordem_servico/checklist/components/checklist-tab.html -->
<link rel="stylesheet" href="../../checklist/style/checklist-tab.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="checklist-container">
    <!-- Card de Status Principal -->
    <div id="checklistStatusCard" class="checklist-status-card">
        <div class="status-info">
            <div class="status-icon-wrapper">
                <i id="statusIcon" class="fas fa-exclamation-circle"></i>
            </div>
            <div class="status-text">
                <h2 id="statusTitle">Checklist Pendente</h2>
                <p id="statusDesc">A O.S. está <strong>bloqueada</strong>. Preenchimento e assinatura obrigatórios.</p>
            </div>
        </div>
        <div class="status-actions">
            <button id="btnOpenChecklist" class="btn btn-primary">
                <i class="fas fa-edit"></i> Preencher Checklist
            </button>
            <button id="btnViewChecklist" class="btn btn-secondary" style="display: none;">
                <i class="fas fa-eye"></i> Ver Checklist
            </button>
        </div>
    </div>

    <!-- Card de Resumo -->
    <div class="card-resumo">
        <div class="resumo-header">
            <i class="fas fa-clipboard-list"></i>
            <h3>Resumo do Recebimento</h3>
        </div>
        <div class="resumo-lista">
            <div class="resumo-item">
                <div class="resumo-label"><i class="fas fa-chart-line"></i><span>Status</span></div>
                <div id="summaryStatus" class="resumo-value badge badge-warning">Pendente</div>
            </div>
            <div class="resumo-item">
                <div class="resumo-label"><i class="fas fa-calendar-alt"></i><span>Data do Recebimento</span></div>
                <div id="summaryDate" class="resumo-value">—</div>
            </div>
            <div class="resumo-item">
                <div class="resumo-label"><i class="fas fa-user-check"></i><span>Consultor</span></div>
                <div id="summaryResponsible" class="resumo-value">—</div>
            </div>
            <div class="resumo-item">
                <div class="resumo-label"><i class="fas fa-signature"></i><span>Assinatura Cliente</span></div>
                <div id="summarySignClient" class="resumo-value text-danger"><i class="fas fa-times-circle"></i> Não assinado</div>
            </div>
            <div class="resumo-item">
                <div class="resumo-label"><i class="fas fa-user-cog"></i><span>Assinatura Técnico</span></div>
                <div id="summarySignTech" class="resumo-value text-danger"><i class="fas fa-times-circle"></i> Não assinado</div>
            </div>
            <div class="resumo-item">
                <div class="resumo-label"><i class="fas fa-camera"></i><span>Fotos Anexadas</span></div>
                <div id="summaryPhotosCount" class="resumo-value">0 fotos</div>
            </div>
        </div>
    </div>
</div>

<!-- Template do Wizard (modal) -->
<template id="wizardTemplate">
    <div class="checklist-wizard">
        <div class="wizard-header">
            <h3><i class="fas fa-clipboard-list"></i> Checklist de Recebimento</h3>
            <p>Clique nos passos para navegar</p>
        </div>

        <!-- Stepper clicável -->
        <div class="wizard-steps">
            <div class="step-item active" data-step="1"><div class="step-icon"><i class="fas fa-car"></i></div><span>Veículo</span></div>
            <div class="step-item" data-step="2"><div class="step-icon"><i class="fas fa-car-side"></i></div><span>Externo</span></div>
            <div class="step-item" data-step="3"><div class="step-icon"><i class="fas fa-couch"></i></div><span>Interno</span></div>
            <div class="step-item" data-step="4"><div class="step-icon"><i class="fas fa-wrench"></i></div><span>Mecânica</span></div>
            <div class="step-item" data-step="5"><div class="step-icon"><i class="fas fa-camera"></i></div><span>Fotos</span></div>
            <div class="step-item" data-step="6"><div class="step-icon"><i class="fas fa-signature"></i></div><span>Assinar</span></div>
        </div>

        <form id="checklistForm">
            <!-- PAINEL 1 - VEÍCULO -->
            <div class="wizard-panel active" data-step="1">
                <div class="panel-card">
                    <div class="panel-title"><i class="fas fa-info-circle"></i> Informações do Veículo</div>
                    <div class="form-group">
                        <label>Data de Recebimento *</label>
                        <input type="date" name="data_recebimento" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Consultor Responsável *</label>
                        <input type="text" name="consultor" class="form-control" placeholder="Ex: João Silva" required>
                    </div>
                    <div class="form-group">
                        <label>Quilometragem (km) *</label>
                        <input type="number" name="km" class="form-control" placeholder="Ex: 45200" required>
                    </div>
                    <div class="form-group">
                        <label>Nível de Combustível</label>
                        <select name="fuel" class="form-control">
                            <option value="reserva">Reserva</option>
                            <option value="1/4">1/4</option>
                            <option value="1/2">1/2 (Meio Tanque)</option>
                            <option value="3/4">3/4</option>
                            <option value="cheio">Cheio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Observações Iniciais</label>
                        <textarea name="obs_inicial" class="form-control" rows="2" placeholder="Barulhos, luzes acesas..."></textarea>
                    </div>
                </div>
            </div>

            <!-- PAINEL 2 - EXTERNO -->
            <div class="wizard-panel" data-step="2">
                <div class="panel-card">
                    <div class="panel-title"><i class="fas fa-car-side"></i> Inspeção Visual Externa</div>
                    <div class="form-group">
                        <label>Lataria / Pintura</label>
                        <textarea name="ext_body" class="form-control" rows="3" placeholder="Arranhões, amassados..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Vidros e Faróis</label>
                        <textarea name="ext_glass" class="form-control" rows="3" placeholder="Trincas, quebras..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-camera"></i> Fotos da parte externa</label>
                        <div class="photo-dropzone" data-categoria="externo">
                            <i class="fas fa-cloud-upload-alt fa-2x"></i>
                            <p>Clique ou arraste fotos (lataria, vidros, faróis)</p>
                        </div>
                        <input type="file" class="file-input-externo" multiple accept="image/*" style="display:none">
                        <div class="photo-grid preview-externo"></div>
                        <div class="photo-counter count-externo">0 foto(s)</div>
                    </div>
                </div>
            </div>

            <!-- PAINEL 3 - INTERNO -->
            <div class="wizard-panel" data-step="3">
                <div class="panel-card">
                    <div class="panel-title"><i class="fas fa-couch"></i> Inspeção Interna</div>
                    <div class="checkbox-group">
                        <label class="checkbox-container">
                            <input type="checkbox" id="chk_manual" name="has_manual">
                            <span class="checkmark"></span>
                            <span>Manual e Livrete a bordo</span>
                        </label>
                        <label class="checkbox-container">
                            <input type="checkbox" id="chk_step" name="has_step">
                            <span class="checkmark"></span>
                            <span>Estepe / Macaco presentes</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label>Observações do Interior</label>
                        <textarea name="int_obs" class="form-control" rows="2" placeholder="Estofamento, cheiros, pertences..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-camera"></i> Fotos do interior</label>
                        <div class="photo-dropzone" data-categoria="interno">
                            <i class="fas fa-cloud-upload-alt fa-2x"></i>
                            <p>Clique ou arraste fotos (bancos, painel, porta-malas)</p>
                        </div>
                        <input type="file" class="file-input-interno" multiple accept="image/*" style="display:none">
                        <div class="photo-grid preview-interno"></div>
                        <div class="photo-counter count-interno">0 foto(s)</div>
                    </div>
                </div>
            </div>

            <!-- PAINEL 4 - MECÂNICA -->
            <div class="wizard-panel" data-step="4">
                <div class="panel-card">
                    <div class="panel-title"><i class="fas fa-wrench"></i> Verificação sob o Capô</div>
                    <div class="form-group">
                        <label>Nível Óleo Motor</label>
                        <select name="mech_oil" class="form-control">
                            <option value="ok">Nível Normal</option>
                            <option value="low">Baixo</option>
                            <option value="crit">Crítico / Vazio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Fluido Arrefecimento</label>
                        <select name="mech_coolant" class="form-control">
                            <option value="ok">Nível Normal</option>
                            <option value="low">Baixo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Observações da Mecânica</label>
                        <textarea name="mec_obs" class="form-control" rows="2" placeholder="Vazamentos, correias, barulhos..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-camera"></i> Fotos do motor/fluidos</label>
                        <div class="photo-dropzone" data-categoria="mecanica">
                            <i class="fas fa-cloud-upload-alt fa-2x"></i>
                            <p>Clique ou arraste fotos (motor, fluídos, correias)</p>
                        </div>
                        <input type="file" class="file-input-mecanica" multiple accept="image/*" style="display:none">
                        <div class="photo-grid preview-mecanica"></div>
                        <div class="photo-counter count-mecanica">0 foto(s)</div>
                    </div>
                </div>
            </div>

            <!-- PAINEL 5 - VISÃO GERAL DAS FOTOS -->
            <div class="wizard-panel" data-step="5">
                <div class="panel-card">
                    <div class="panel-title"><i class="fas fa-camera"></i> Todas as Fotos Anexadas</div>
                    <div class="photo-grid" id="photoPreviewGrid"></div>
                    <div class="photo-counter" id="photoCounter">0 foto(s) no total</div>
                    <small class="form-text">Mínimo obrigatório: 4 fotos no total</small>
                </div>
            </div>

            <!-- PAINEL 6 - ASSINATURAS -->
            <div class="wizard-panel" data-step="6">
                <div class="panel-card">
                    <div class="panel-title"><i class="fas fa-signature"></i> Assinaturas</div>
                    <div class="signature-box">
                        <label><i class="fas fa-user"></i> Assinatura do Cliente *</label>
                        <div class="signature-pad-wrapper"><canvas id="sigClient" class="signature-pad"></canvas></div>
                        <button type="button" class="btn-clear" data-canvas="sigClient">Limpar</button>
                    </div>
                    <div class="signature-box">
                        <label><i class="fas fa-user-cog"></i> Assinatura do Técnico *</label>
                        <div class="signature-pad-wrapper"><canvas id="sigTech" class="signature-pad"></canvas></div>
                        <button type="button" class="btn-clear" data-canvas="sigTech">Limpar</button>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="btnFinalizarChecklist" class="btn btn-success">Finalizar Checklist</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</template>
