<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pit Stop Inteligente – Gerenciamento de Clientes</title>
    
    <link rel="stylesheet" href="../../../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../../../shared/styles/global.css">
    
    <link rel="stylesheet" href="../style/cadastro-cliente.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module" src="../../../../shared/components/oficina-header.js"></script>
    <script type="module" src="../../../../shared/components/oficina-sidebar.js"></script>
</head>
<body>
    <oficina-header></oficina-header>

    <div class="main-container">
        <oficina-sidebar page="clientes"></oficina-sidebar>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Gerenciamento de Clientes</h1>
                    <div class="breadcrumb">
                        <span class="breadcrumb-item">Home</span>
                        <span class="breadcrumb-separator">/</span>
                        <span class="breadcrumb-item active">Clientes</span>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button type="button" class="btn btn-secondary" id="btnCancelar">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="button" class="btn btn-primary" id="btnSalvar">
                        <i class="fas fa-save"></i> Salvar Cliente
                    </button>
                </div>
            </div>

            <div class="content-grid">
                
                <div class="form-section">
                    <div class="card-header">
                        <h2 class="card-title">Dados do Cliente</h2>
                    </div>
                    
                    <form id="formCliente" autocomplete="off">
                        <input type="hidden" id="clienteId" name="id">
                        
                        <div class="form-row">
                            <div class="form-group col-span-2">
                                <label for="nome" class="form-label">Nome Completo <span class="required">*</span></label>
                                <input type="text" id="nome" name="nome" class="form-control" placeholder="Ex: João da Silva" required>
                            </div>
                        </div>

                        <div class="form-row two-cols">
                            <div class="form-group">
                                <label for="documento" class="form-label">CPF / CNPJ <span class="required">*</span></label>
                                <input type="text" id="documento" name="documento" class="form-control" placeholder="000.000.000-00" required>
                            </div>
                            <div class="form-group">
                                <label for="telefone" class="form-label">Telefone <span class="required">*</span></label>
                                <input type="text" id="telefone" name="telefone" class="form-control" placeholder="(00) 00000-0000" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-span-2">
                                <label for="email" class="form-label">E-mail <span class="required">*</span></label>
                                <input type="email" id="email" name="email" class="form-control" placeholder="cliente@email.com" required>
                            </div>
                        </div>

                        <hr class="form-divider">
                        <h3 class="section-subtitle">Endereço</h3>

                        <div class="form-row address-search-row">
                            <div class="form-group">
                                <label for="cep" class="form-label">CEP</label>
                                <div class="input-group">
                                    <input type="text" id="cep" name="cep" class="form-control" placeholder="00000-000">
                                    <button type="button" class="btn btn-outline" id="btnBuscarCep" title="Buscar CEP">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group flex-grow">
                                <label for="logradouro" class="form-label">Logradouro</label>
                                <input type="text" id="logradouro" name="logradouro" class="form-control">
                            </div>
                        </div>

                        <div class="form-row three-cols">
                            <div class="form-group">
                                <label for="numero" class="form-label">Número</label>
                                <input type="text" id="numero" name="numero" class="form-control">
                            </div>
                            <div class="form-group col-span-2">
                                <label for="complemento" class="form-label">Complemento</label>
                                <input type="text" id="complemento" name="complemento" class="form-control">
                            </div>
                        </div>

                        <div class="form-row three-cols">
                            <div class="form-group">
                                <label for="bairro" class="form-label">Bairro</label>
                                <input type="text" id="bairro" name="bairro" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="cidade" class="form-label">Cidade</label>
                                <input type="text" id="cidade" name="cidade" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="estado" class="form-label">UF</label>
                                <input type="text" id="estado" name="estado" class="form-control" maxlength="2">
                            </div>
                        </div>

                        <div class="preferences-container">
                            <h3 class="section-subtitle" style="margin-top:0;">Preferências de Contato</h3>
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="pref_whatsapp" id="pref_whatsapp">
                                    WhatsApp
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="pref_email" id="pref_email">
                                    E-mail
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="pref_sms" id="pref_sms">
                                    SMS
                                </label>
                            </div>
                        </div>
                    </form>
                </div>

                <aside class="list-section">
                    <div class="list-header">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h2 class="card-title" style="margin:0; font-size: 1.1rem;">Clientes</h2>
                            <span class="badge" id="totalClientes">0</span>
                        </div>
                    </div>
                    
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchClient" class="search-input" placeholder="Buscar...">
                    </div>

                    <div class="client-list-container" id="listaClientes">
                        <div class="empty-state" style="text-align: center; padding: 2rem; color: var(--secondary);">
                            <i class="fas fa-users" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></i>
                            <p>Carregando...</p>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="../components/cadastro-cliente.js"></script>
</body>
</html>
