<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione a oficina que deseja gerenciar - Pit Stop Inteligente">
    <title>Pit Stop Inteligente - Selecionar Oficina</title>

    <link rel="stylesheet" href="../../../shared/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../../shared/styles/global.css">
    <link rel="stylesheet" href="../style/selecionar-oficina.css">
</head>
<body class="login-body">

    <main class="selector-container fade-in" id="mainSelector">
        <header class="selector-header">
            <div class="logo-placeholder" aria-hidden="true">
                <i class="fas fa-car-side"></i>
            </div>
            <h1 class="selector-title">Selecione a oficina</h1>
            <p class="selector-subtitle" id="selectorSubtitle">
                Você tem acesso a mais de uma oficina. Escolha qual deseja gerenciar agora.
            </p>
        </header>

        <section
            id="listaOficinas"
            class="oficinas-list"
            aria-label="Lista de oficinas disponíveis"
            aria-busy="true"
        >
            <div class="oficinas-loading">
                <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
                <p>Carregando oficinas...</p>
            </div>
        </section>

        <footer class="selector-footer">
            <button type="button" id="btnSair" class="btn-link">
                <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Sair
            </button>
        </footer>
    </main>

    <script type="module" src="../components/selecionar-oficina.js"></script>
</body>
</html>
